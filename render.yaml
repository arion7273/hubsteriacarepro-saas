services:
  - type: web
    name: hubsteriacarepro-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hubsteriacarepro-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
  - type: web
    name: hubsteriacarepro-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
databases:
  - name: hubsteriacarepro-db
    databaseName: hubsteriacarepro
    user: hubsteria
